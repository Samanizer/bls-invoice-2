# frontend/nginx.conf
# Nginx configuration for serving the React SPA.
# All unknown paths are served index.html to support client-side routing.
# /api requests are proxied to the backend service.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # React SPA — serve index.html for any path not matched above
    location / {
        try_files $uri $uri/ /index.html;
    }
}
